<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nutríssima Fábrica</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root{--cacau:#33200F;--leite:#FFFDF9;--casca:#EFE7DC;--pistache:#3E7C45;--pistache-esc:#2E5F34;--morango:#C63A3A;--mel:#B8862B;--linha:#DCD2C4;--raio:14px}
*{box-sizing:border-box;margin:0}
body{font-family:-apple-system,system-ui,'Segoe UI',sans-serif;background:var(--leite);color:var(--cacau);min-height:100vh}
.mono{font-family:ui-monospace,Menlo,monospace}
.app{max-width:520px;margin:0 auto;min-height:100vh;padding-bottom:100px}
.trilha{display:flex;gap:4px;overflow-x:auto;padding:10px 16px;background:var(--cacau)}
.trilha span{flex:none;font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:#B9A896;padding:5px 10px;border-radius:99px;border:1px solid #5A4630}
.trilha span.atual{background:var(--pistache);border-color:var(--pistache);color:#fff}
.topo{padding:16px;display:flex;align-items:center;gap:12px}
.topo .voltar{width:46px;height:46px;border-radius:12px;border:1.5px solid var(--linha);background:#fff;font-size:20px;cursor:pointer}
.topo h1{font-size:24px;font-weight:900}
.topo p{font-size:13.5px;color:#7A6A57}
main{padding:4px 16px}
.card{background:#fff;border:1.5px solid var(--linha);border-radius:var(--raio);padding:16px;margin-bottom:12px}
.pergunta{font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#8A7A64;margin:12px 0 8px}
.chips{display:flex;gap:8px;flex-wrap:wrap}
.step-label{font-size:11px;font-weight:800;color:#7A6A57;text-transform:uppercase;letter-spacing:.04em;display:block;margin-bottom:8px}
.chips button{padding:12px 18px;border-radius:99px;border:1.5px solid var(--linha);background:#fff;font-size:16px;font-weight:700;cursor:pointer;min-height:48px}
.chips button.sel{background:#E9DCC8;color:var(--cacau);border-color:#C9AF8C;font-weight:900}
.acoes{display:grid;gap:12px;margin-top:8px}
.acoes button{display:flex;align-items:center;gap:14px;padding:18px;border-radius:var(--raio);border:1.5px solid var(--linha);background:#fff;cursor:pointer;text-align:left;min-height:72px;font-family:inherit}
.acoes .ico{width:44px;height:44px;border-radius:12px;display:grid;place-items:center;font-size:22px;flex:none}
.acoes b{font-size:18px;display:block;color:var(--cacau)}
.acoes small{font-size:13px;color:#7A6A57}
.btnP{width:100%;min-height:58px;font-size:18px;font-weight:900;border:none;border-radius:16px;background:var(--pistache);color:#fff;cursor:pointer;font-family:inherit;margin-top:8px}
.btnP:disabled{background:#C8C0B4}
.btnSec{width:100%;min-height:50px;font-size:16px;font-weight:700;border:1.5px solid var(--linha);border-radius:14px;background:#fff;cursor:pointer;font-family:inherit;margin-top:8px;color:var(--cacau)}
input,select{width:100%;padding:13px 14px;font-size:17px;border:1.5px solid var(--linha);border-radius:12px;font-family:inherit;background:#fff;color:var(--cacau)}
input:focus,select:focus{outline:none;border-color:var(--pistache)}
label{display:block;font-size:13px;font-weight:700;color:#7A6A57;margin:12px 0 5px}
.campoG{font-size:32px!important;font-weight:900;text-align:center;font-variant-numeric:tabular-nums}
.item-row{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:13px 2px;border-bottom:1px solid var(--linha);font-size:16px}
.item-row .saldo{font-weight:900;font-variant-numeric:tabular-nums;font-size:17px;white-space:nowrap}
.item-row.baixo .saldo{color:var(--morango)}
.chip{display:inline-block;padding:4px 11px;border-radius:99px;font-size:12px;font-weight:700;text-transform:uppercase}
.chip.ok{background:#E7F0E4;color:var(--pistache-esc)}.chip.mel{background:#F6ECD6;color:#7A5A14}.chip.azul{background:#E4EDF2;color:#2B5A78}.chip.laranja{background:#FBE6D6;color:#B0510F}.chip.ver{background:#FBEAEA;color:var(--morango)}
.check{display:flex;align-items:center;gap:12px;padding:12px;border:1.5px solid var(--linha);border-radius:12px;font-size:16px;cursor:pointer;background:#fff;margin-bottom:8px}
.check input{width:26px;height:26px;accent-color:var(--pistache);flex:none}
.check .qtd{margin-left:auto;font-weight:900;font-variant-numeric:tabular-nums}
.check.ok{background:#F0F6EE;border-color:#BFD8C0}
.resumo{background:#F6F1E8;border-radius:var(--raio);padding:16px;font-size:16.5px;line-height:1.55;border:1.5px solid var(--linha)}
.kpis{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.kpi{background:#fff;border:1.5px solid var(--linha);border-radius:var(--raio);padding:14px;text-align:center}
.kpi b{font-size:34px;font-variant-numeric:tabular-nums;display:block}
.kpi p{font-size:12.5px;font-weight:700}
.kpi.alerta{border-color:#E8B9B9;background:#FDF7F7}.kpi.alerta b{color:var(--morango)}
.feed{border-left:3px solid var(--linha);padding-left:14px;display:grid;gap:13px}
.feed .hora{font-size:12px;color:#7A6A57}
.msg{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:var(--cacau);color:#fff;padding:14px 22px;border-radius:14px;font-weight:700;font-size:15px;z-index:99;max-width:90%;text-align:center;box-shadow:0 6px 24px #0004}
.msg.erro{background:var(--morango)}
.tela{display:none}.tela.on{display:block}
.dia{display:flex;gap:10px;align-items:center;margin:14px 0 10px;background:var(--cacau);color:#fff;border-radius:var(--raio);padding:11px 15px}
.dia b{font-size:24px;font-variant-numeric:tabular-nums}
.dia div{flex:1;font-size:13px;color:#E8DECF}
.mo{flex:none;width:64px;text-align:center;border-radius:12px;padding:8px 2px}
.mo small{font-size:9px;text-transform:uppercase;letter-spacing:.05em;font-weight:700}
.mo b{display:block;font-size:26px;line-height:1}
.mo.m1{background:#F3EAD8;color:#7A5A14}.mo.m2{background:#E4EDF2;color:#2B5A78}
.center{text-align:center;color:#8A7A64;padding:30px 10px;font-size:15px}
/* Modo TV — cartaz */
.tv{background:radial-gradient(1200px 600px at 20% -10%,#2E4250,#141C22 60%);color:#FFFDF9;min-height:100vh;padding:22px 28px;max-width:none}
.tv h1{font-size:38px;font-weight:900;letter-spacing:-.01em}
.tv .relogio{font-size:40px;font-variant-numeric:tabular-nums;font-weight:900;color:#FFD84D;text-shadow:0 0 18px #FFD84D55}
.tv .recado{background:linear-gradient(90deg,#FFD84D,#FFB93B);color:#3A2400;border-radius:16px;padding:16px 22px;font-size:28px;font-weight:900;margin:16px 0;box-shadow:0 6px 24px #FFB93B44;animation:flutua 3s ease-in-out infinite}
@keyframes flutua{50%{transform:translateY(-3px)}}
.tv-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:18px;margin-top:16px}
.tv-col{background:#00000038;border-radius:22px;padding:0 0 14px;overflow:hidden;border:1px solid #ffffff14}
.tv-col h2{font-size:24px;letter-spacing:.1em;text-transform:uppercase;font-weight:900;padding:14px 18px;margin-bottom:12px;color:#1C0F06}
.tv-item{margin:0 16px 20px;background:#ffffff0a;border-radius:16px;padding:14px 16px;border:2px solid transparent}
.tv-item .nome{font-size:23px;font-weight:900}
.tv-item .pct{font-size:56px;font-weight:900;line-height:1;font-variant-numeric:tabular-nums;color:#FFD84D}
.tv-item .nums{font-size:20px;font-weight:800;color:#E8DECF;font-variant-numeric:tabular-nums}
.tv-bar{height:26px;background:#00000055;border-radius:99px;overflow:hidden;margin-top:10px;border:1px solid #ffffff22}
.tv-bar i{display:block;height:100%;border-radius:99px;transition:width 1.2s ease;background:repeating-linear-gradient(45deg,#FFB93B,#FFB93B 14px,#FFCE6B 14px,#FFCE6B 28px);background-size:200% 100%;animation:anda 1.6s linear infinite}
@keyframes anda{to{background-position:56px 0}}
.tv-item.feito{border-color:#7ED957;box-shadow:0 0 28px #7ED95744,inset 0 0 22px #7ED95722;animation:comemora .7s ease}
.tv-item.feito .pct{color:#7ED957;text-shadow:0 0 18px #7ED95788}
.tv-item.feito .tv-bar i{background:#7ED957;animation:none}
.tv-item.feito .nome::after{content:"  🎉 META BATIDA!";color:#7ED957;font-size:17px}
@keyframes comemora{0%{transform:scale(.96)}55%{transform:scale(1.03)}100%{transform:scale(1)}}
.tv-item.atrasado{border-color:#FF5A5A;animation:alerta 1.2s infinite}
.tv-item.atrasado .pct{color:#FF7B7B}
.tv-item.atrasado .nome::after{content:"  ⏰ ACELERA!";color:#FF7B7B;font-size:17px}
.tv-item.critico{border-color:#FF5A5A}
.tv-item.critico .pct{color:#FF7B7B}
.tv-desp{background:#00000038;border-radius:22px;padding:18px 20px;margin-top:16px;border:1px solid #ffffff14}
.tv-desp h2{font-size:24px;letter-spacing:.06em;text-transform:uppercase;font-weight:900;color:#FFD84D}
.tv-desp .item-row{border-color:#ffffff1c;padding:10px 0;font-size:18px}
@keyframes alerta{50%{border-color:#FF5A5A22;box-shadow:0 0 22px #FF5A5A33}}
.tv .semmeta{color:#8A7A64;font-size:18px;padding:0 18px 8px}
.tv-dash{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px;margin-top:16px;align-items:start}
.tv-dash .wide{grid-column:1/-1}
.calweek{display:flex;align-items:center;gap:8px;margin:6px 0 10px}
.calweek>button{flex:none;min-width:52px;height:44px;border:1.5px solid var(--linha);background:#fff;border-radius:12px;font-size:20px;font-weight:900;cursor:pointer;color:var(--cacau);display:flex;align-items:center;justify-content:center;gap:4px}
.calweek>button i{font-size:11px;font-style:normal;background:var(--mel);color:#fff;border-radius:99px;padding:1px 6px}
.calweek-t{flex:1;text-align:center}
.calweek-t>b{display:block;font-size:15px;text-transform:capitalize}
.calhoje{margin-top:2px;border:none;background:none;color:var(--pistache);font-weight:800;font-size:12px;cursor:pointer;text-decoration:underline}
.calscroll{display:flex;gap:10px;overflow-x:auto;padding:2px 2px 12px;scroll-snap-type:x proximity;-webkit-overflow-scrolling:touch}
.calday{flex:none;width:158px;scroll-snap-align:start;background:#FAF6EF;border:1.5px solid var(--linha);border-radius:14px;padding:8px;min-height:96px}
.calday.hoje{border-color:var(--pistache);box-shadow:0 0 0 2px #3E7C4522;background:#F1F7EE}
.calday>header{display:flex;align-items:baseline;justify-content:space-between;padding:2px 4px 8px;border-bottom:1px dashed var(--linha);margin-bottom:8px}
.calday>header b{font-size:12px;text-transform:uppercase;letter-spacing:.03em;color:#8A7A64}
.calday>header span{font-size:20px;font-weight:900;font-variant-numeric:tabular-nums}
.calday.hoje>header span{color:var(--pistache)}
.calvazio{color:#C3B8A6;text-align:center;font-size:20px;padding:8px 0}
.calgrp{background:#fff;border:1.5px solid var(--linha);border-radius:12px;padding:8px;margin-bottom:8px}
.calgrp-h{display:flex;gap:7px;align-items:center;margin-bottom:7px}
.calgrp-h b{font-size:14px;line-height:1.15;display:block}
.calgrp-h small{font-size:11px;color:#7A6A57}
.calmo{flex:none;font-size:12px;font-weight:900;padding:3px 8px;border-radius:8px}
.calmo.m1{background:#F3EAD8;color:#7A5A14}.calmo.m2{background:#E4EDF2;color:#2B5A78}
.calbat{border-top:1px solid #EFE7DC;padding-top:7px;margin-top:7px}
.calgrp .calbat:first-of-type{border-top:none;padding-top:0;margin-top:0}
details.calgrp{padding:0}
details.calgrp>summary{list-style:none;cursor:pointer;padding:8px;margin-bottom:0}
details.calgrp>summary::-webkit-details-marker{display:none}
details.calgrp>summary::after{content:'▾';margin-left:4px;color:#B8A88F;font-size:13px;transition:transform .15s ease}
details.calgrp[open]>summary{border-bottom:1px solid var(--linha);margin-bottom:6px}
details.calgrp[open]>summary::after{transform:rotate(180deg)}
details.calgrp>.calbat{padding-left:8px;padding-right:8px}
details.calgrp>.calbat:last-child{padding-bottom:8px}
.calbat-h{display:flex;justify-content:space-between;align-items:center;font-size:13px;gap:4px}
.calbat-h .lote{font-size:10px;color:#7A6A57}
.calbat .chip{margin:4px 0;font-size:10px;padding:2px 8px}
.calbtn{width:100%;min-height:42px;font-size:14px;font-weight:800;border:none;border-radius:10px;background:var(--pistache);color:#fff;cursor:pointer;font-family:inherit;margin-top:4px}
.calbtn.mel{background:var(--mel)}
.calbtn.azul{background:#2B5A78}
.calbtn.laranja{background:#D9772B}
.calmini{display:flex;gap:5px;margin-top:5px}
.calinfo{margin-top:6px;padding:6px 8px;border-radius:8px;font-size:12px;font-weight:700;text-align:center}
.calinfo.ok{background:#E7F0E4;color:var(--pistache-esc)}
.calinfo.pend{background:#FBE6D6;color:#B0510F}
.calsec{margin-bottom:10px}
.calsec-h{display:flex;justify-content:space-between;align-items:baseline;font-size:11px;font-weight:800;letter-spacing:.03em;padding:0 2px 5px}
.calsec-h b{font-family:ui-monospace,Menlo,monospace;font-size:13px;font-weight:700;color:#33200F}
.calsec-h.mel{color:#7A5A14}
.calsec-h.azul{color:#2B5A78}
.kanscroll{display:flex;gap:10px;overflow-x:auto;padding:2px 2px 12px;margin-bottom:14px}
.kancol{flex:none;width:190px;background:#FAF6EF;border:1.5px solid var(--linha);border-radius:14px;padding:8px}
.kancol-h{display:flex;justify-content:space-between;align-items:baseline;font-size:11px;font-weight:800;letter-spacing:.03em;padding:2px 4px 8px;border-bottom:1px dashed var(--linha);margin-bottom:8px}
.kancard{background:#fff;border:1px solid var(--linha);border-radius:10px;padding:8px;margin-bottom:8px}
.kancard .kd{display:flex;justify-content:space-between;align-items:baseline;font-size:10px;color:#A99A82;text-transform:uppercase;letter-spacing:.03em;margin-bottom:3px}
.kancard b{font-size:13px}
.kanvazio{color:#A99A82;font-size:12px;padding:8px 4px}
.calmini button{flex:1;min-height:34px;font-size:12px;font-weight:700;border:1.5px solid var(--linha);background:#fff;border-radius:9px;cursor:pointer;color:var(--cacau);font-family:inherit}
.calmini button.del{flex:0 0 auto;padding:0 11px;color:var(--morango);border-color:#E8C4C4}
.calprev{font-size:13px;color:#7A5A14;background:#F6ECD6;border-radius:10px;padding:8px 10px;margin:8px 0}
.calprev:empty{display:none}
.caltrilha{width:100%;min-height:32px;font-size:12px;font-weight:700;border:1px solid var(--linha);background:#fff;border-radius:9px;cursor:pointer;color:#7A6A57;font-family:inherit;margin-top:5px}
.tl{position:relative;padding-left:34px;margin-top:8px}
.tl::before{content:'';position:absolute;left:13px;top:10px;bottom:28px;width:2px;background:var(--linha)}
.tl .no{position:relative;margin-bottom:18px}
.tl .no:last-child{margin-bottom:0}
.tl .pt{position:absolute;left:-34px;top:-2px;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;border:2px solid var(--linha);background:#fff;color:#B8A88F}
.tl .no.ok .pt{background:var(--pistache);border-color:var(--pistache);color:#fff}
.tl .no>b{font-size:15px}
.tl .no small{display:block;font-size:13px;color:#7A6A57;margin-top:2px}
.tl-mp{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.tl-mp span{font-size:11px;font-family:ui-monospace,Menlo,monospace;background:#F6F1E8;border:1px solid var(--linha);padding:3px 8px;border-radius:8px}
.leque{background:#F6ECD6;border-radius:12px;padding:12px 14px;margin:10px 0}
.leque .lq-h{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:#7A5A14;margin-bottom:8px;font-weight:700}
.leque .chips2{display:flex;gap:6px;flex-wrap:wrap}
.leque .chips2 span{font-size:12px;background:#fff;border:1px solid var(--linha);padding:3px 9px;border-radius:8px}
.leque .cav{font-size:11px;color:#7A5A14;margin-top:8px;line-height:1.5}
/* ===== Responsivo: PC de produção (maior) + TV em tela cheia ===== */
body{overflow-x:hidden}
@media (min-width:820px){
  .app{max-width:900px}
  main{padding:8px 28px}
  .topo{padding:18px 28px}
  .topo h1{font-size:26px}
  .topo p{font-size:14px}
  .acoes{grid-template-columns:1fr 1fr;gap:12px}
  .acoes button{min-height:68px;padding:16px}
  .acoes .ico{width:42px;height:42px;font-size:20px}
  .acoes b{font-size:16px}
  .acoes small{font-size:13px}
  .card{padding:16px}
  .btnP{min-height:46px;font-size:15px}
  .btnSec{min-height:40px;font-size:13.5px}
  .chips button{font-size:13px;min-height:auto;padding:7px 14px}
  .calday{width:190px}
  .calweek-t>b{font-size:17px}
  .mv-layout{display:grid;grid-template-columns:260px 1fr;gap:16px;align-items:start}
  .mv-layout .card{padding:14px}
  .mv-layout .chips button{font-size:13px;min-height:auto;padding:7px 14px}
  .mv-grupos{display:grid;grid-template-columns:1fr 1fr;gap:10px;max-height:60vh;overflow-y:auto;padding-right:6px}
  #lista{max-height:74vh;overflow-y:auto;padding-right:6px}
}
@media (min-width:1200px){
  .app{max-width:1040px}
  .acoes{grid-template-columns:repeat(3,1fr)}
}
@media (min-width:1440px){
  .app{max-width:1540px}
  .calday{width:205px}
  .kancol{width:230px}
}
/* TV sai do container e ocupa a tela inteira */
.tv{width:100vw;position:relative;left:50%;transform:translateX(-50%);max-width:none}
@media (min-width:1100px){
  .tv{padding:3.2vh 3vw}
  .tv h1{font-size:clamp(38px,3.1vw,60px)}
  .tv .relogio{font-size:clamp(40px,3.3vw,64px)}
  .tv .recado{font-size:clamp(28px,2.3vw,44px)}
  .tv-grid{grid-template-columns:repeat(auto-fit,minmax(min(30vw,440px),1fr));gap:2vw}
  .tv-col h2{font-size:clamp(24px,1.8vw,34px)}
  .tv-item .nome{font-size:clamp(23px,1.8vw,32px)}
  .tv-item .pct{font-size:clamp(56px,4.4vw,88px)}
  .tv-item .nums{font-size:clamp(20px,1.4vw,28px)}
  .tv-desp h2{font-size:clamp(24px,1.8vw,34px)}
  .tv-desp .item-row{font-size:clamp(18px,1.3vw,24px)}
}
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
/* ================= CONFIG ================= */
const SUPA_URL='https://nfzospymzvlwzlcpgolm.supabase.co';
let sb=null, EST={operador:localStorage.getItem('nf_operador')||'', cache:{}};

function el(html){const d=document.createElement('div');d.innerHTML=html.trim();return d.firstChild}
function fmt(n,dec=1){return Number(n).toLocaleString('pt-BR',{maximumFractionDigits:dec})}
function hoje(){return new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'})}
function loteSugestao(seq){const d=new Date();const dia=Math.floor((d-new Date(d.getFullYear(),0,0))/864e5);const s=String(d.getFullYear()).slice(2)+String(dia).padStart(3,'0');return s+'-'+(seq||1)}
function msg(t,erro){const m=el(`<div class="msg ${erro?'erro':''}">${t}</div>`);document.body.appendChild(m);setTimeout(()=>m.remove(),3800)}
const brData=d=>new Date(d+'T12:00').toLocaleDateString('pt-BR');
function trilha(atual){const etapas=['Programação','Compra','Receber','Pesagem','Moinho','Balde','Envase','Estoque'];return '<div class="trilha">'+etapas.map(e=>`<span class="${e===atual?'atual':''}">${e}</span>`).join('')+'</div>'}
function topo(t,sub,voltar=true){return `<div class="topo">${voltar?'<button class="voltar" onclick="tela(\'inicio\')">←</button>':''}<div><h1>${t}</h1><p>${sub||''}</p></div></div>`}
function precisaOperador(){if(!EST.operador){msg('Escolha primeiro quem é você, na tela inicial',true);tela('inicio');return true}return false}

/* ================= BOOT / AUTH ================= */
async function boot(){
  const key=localStorage.getItem('nf_key');
  if(!key){return telaConfig()}
  sb=window.supabase.createClient(SUPA_URL,key);
  const {data:{session}}=await sb.auth.getSession();
  if(!session){return telaLogin()}
  tela(location.hash==='#tv'?'tv':'inicio');
}
function telaConfig(){
  document.getElementById('app').innerHTML=`
  ${topo('Configuração','só na primeira vez, neste aparelho',false)}
  <main><div class="card">
    <p style="font-size:15px;line-height:1.5">Cole a <b>chave pública (anon key)</b> do Supabase.<br><small style="color:#7A6A57">supabase.com → projeto nutrissima-producao → Settings → API Keys → <b>anon public</b></small></p>

function salvarCfg(){const k=document.getElementById('cfgKey').value.trim();if(k.length<20)return msg('Chave inválida',true);localStorage.setItem('nf_key',k);boot()}

  document.getElementById('app').innerHTML=`

async function setOp(n){
  if(n===EST.operador)return;
  const pin=prompt('PIN de '+n+' (4 dígitos):');
  if(pin==null)return;
  const {data:ok,error}=await sb.rpc('verificar_pin',{p_nome:n,p_pin:String(pin).trim()});
  if(error)return msg(error.message,true);
  if(!ok)return msg('PIN incorreto para '+n,true);
  EST.operador=n;localStorage.setItem('nf_operador',n);
  document.querySelectorAll('#ops button').forEach(b=>b.classList.toggle('sel',b.textContent===n));
  msg('👤 Operador: '+n);
}

function fCat(b){document.querySelectorAll('[data-f]').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');EST.fcat=b.dataset.f;fEstoque()}
function linhaEst(tipo,id,nome,saldo,un,baixo){
  return `<div class="item-row ${baixo?'baixo':''}"><span>${baixo?'⬤ ':''}${nome}</span>`+
    `<span style="display:flex;align-items:center;gap:10px"><span class="saldo mono">${fmt(saldo)} ${un}</span>`+
    `<button data-t="${tipo}" data-i="${id}" data-s="${saldo}" data-u="${un}" onclick="ajuste(this)" style="border:1.5px solid var(--linha);background:#fff;border-radius:10px;min-width:40px;min-height:38px;cursor:pointer;font-size:15px" title="Ajustar saldo">✏️</button></span></div>`;
}
async function imprimirEstoque(){
  const itens=EST.cache.itens||[], pa=EST.cache.paEst||[], baldes=EST.cache.baldeEst||[];
  const statusMP=i=>{
    const v=Number(i.saldo_atual);
    if(v<0)return['NEGATIVO — investigar','#fff','#C63A3A'];
    if(i.estoque_minimo==null)return['sem mínimo definido','#7A6A57','#F0EBDD'];
    const min=Number(i.estoque_minimo);
    if(v<min)return['abaixo do mínimo','#fff','#C63A3A'];
    if(v<min*1.3)return['perto do mínimo','#fff','#D9772B'];
    return['ok','#fff','#3E7C45'];
  };
  const linhaItem=i=>{const[st,fg,bg]=statusMP(i);const minTxt=i.estoque_minimo!=null?` · mínimo ${fmt(i.estoque_minimo)}`:'';
    return `<div class="linha"><span class="nome">${i.nome}</span><span class="valores"><b class="mono">${fmt(i.saldo_atual)}</b> <span class="un">${i.unidade||''}</span>${minTxt}</span><span class="tag" style="background:${bg};color:${fg}">${st}</span></div>`;};
  const mp=itens.filter(i=>i.categoria==='materia_prima');
  const alerta=mp.filter(i=>['NEGATIVO — investigar','abaixo do mínimo'].includes(statusMP(i)[0]));
  const perto=mp.filter(i=>statusMP(i)[0]==='perto do mínimo');
  const ok=mp.filter(i=>!alerta.includes(i)&&!perto.includes(i));
  const negativos=mp.filter(i=>Number(i.saldo_atual)<0);
  const baldesHtml=baldes.map(b=>`<div class="linha"><span class="nome">🪣 ${b.produtos.nome}</span><span class="valores"><b class="mono">${fmt(b.quantidade_kg)}</b> <span class="un">kg</span></span><span class="tag" style="background:${Number(b.quantidade_kg)>0?'#3E7C45':'#F0EBDD'};color:${Number(b.quantidade_kg)>0?'#fff':'#7A6A57'}">${Number(b.quantidade_kg)>0?'em uso':'vazio'}</span></div>`).join('');
  let poteHtml='',linhaAtual=null;
  pa.forEach(p=>{if(p.linha!==linhaAtual){poteHtml+=`<p class="grupo-titulo">${p.linha||'Sem linha'}</p>`;linhaAtual=p.linha}
    const saldo=Number(p.saldo_potes);const cor=saldo===0?'#C63A3A':(saldo<10?'#D9772B':'#3E7C45');const tag=saldo===0?'zerado':(saldo<10?'baixo':'ok');
    poteHtml+=`<div class="linha"><span class="nome">${p.nome}</span><span class="valores"><b class="mono">${fmt(p.saldo_potes,0)}</b> <span class="un">potes</span></span><span class="tag" style="background:${cor};color:#fff">${tag}</span></div>`;});
  const agora=new Date().toLocaleString('pt-BR');
  const html=`<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><title>Nutríssima — Relatório de Estoque</title>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;700;800&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
  <style>
  :root{--cacau:#33200F;--casca:#EFE7DC;--linha:#DCD2C4;--tinta2:#7A6A57;--header:#22303A}
  *{box-sizing:border-box}body{margin:0;background:var(--casca);font-family:'Archivo',sans-serif;color:var(--cacau)}
  .mono{font-family:'IBM Plex Mono',monospace;font-variant-numeric:tabular-nums}
  .header{background:var(--header);color:#FFFDF9;padding:24px}
  .header .eyebrow{text-transform:uppercase;letter-spacing:.16em;font-size:11px;color:#B9C4CB;font-weight:700}
  .header h1{font-size:22px;margin:4px 0 2px;font-weight:800}.header .sub{font-size:12px;color:#B9C4CB}
  main{max-width:900px;margin:0 auto;padding:18px}
  .card{background:#fff;border:1.5px solid var(--linha);border-radius:14px;margin-bottom:14px;overflow:hidden;break-inside:avoid}
  .card h2{margin:0;padding:11px 14px;font-size:14px;background:var(--casca);border-bottom:1px solid var(--linha)}
  .linha{display:flex;align-items:center;gap:10px;padding:8px 14px;border-top:1px solid #F0EBDD;font-size:13px}
  .nome{flex:1;min-width:0}.valores{white-space:nowrap;color:var(--tinta2);font-size:12.5px}
  .tag{font-size:10px;font-weight:800;text-transform:uppercase;padding:3px 8px;border-radius:20px;white-space:nowrap}
  .grupo-titulo{margin:8px 14px 2px;font-size:10.5px;font-weight:800;color:var(--tinta2);text-transform:uppercase}
  .rodape{font-size:11.5px;color:var(--tinta2);line-height:1.6;background:#fff;border:1.5px solid var(--linha);border-radius:14px;padding:14px}
  @media print{.header{-webkit-print-color-adjust:exact;print-color-adjust:exact}}
  </style></head><body>
  <div class="header"><div class="eyebrow">Nutríssima · Fábrica</div><h1>Relatório de Estoque</h1><div class="sub">foto de agora · gerado em ${agora}</div></div>
  <main>
    <div class="card"><h2>🔴 Matéria-prima — abaixo do mínimo</h2>${alerta.map(linhaItem).join('')||'<div class="linha">Nada abaixo do mínimo.</div>'}</div>
    <div class="card"><h2>🟠 Matéria-prima — perto do mínimo</h2>${perto.map(linhaItem).join('')||'<div class="linha">Nada nessa faixa.</div>'}</div>
    <div class="card"><h2>🪣 Baldes</h2>${baldesHtml}</div>
    <div class="card"><h2>🫙 Potes por linha</h2>${poteHtml}</div>
    <div class="card"><h2>🟢 Matéria-prima — normal</h2>${ok.map(linhaItem).join('')}</div>
    <div class="rodape">
      <p><b>Como ler:</b> abaixo do mínimo = comprar já; perto do mínimo = ficar de olho; baldes mostram o que já foi refinado.</p>
      ${negativos.length?`<p><b>⚠️ Atenção:</b> ${negativos.length} item(ns) com saldo negativo (${negativos.map(i=>i.nome).join(', ')}) — provável erro de lançamento, recomenda-se contagem física.</p>`:''}
      <p><b>Procedência:</b> tabelas itens, estoque_balde e produto_acabado — gerado em ${agora}.</p>
    </div>
  </main></body></html>`;
  const w=window.open('','_blank');w.document.write(html);w.document.close();
  setTimeout(()=>{try{w.print()}catch(e){}},300);
}
function fEstoque(){
  const q=(document.getElementById('busca').value||'').toLowerCase();
  let html='';
  if(EST.fcat==='pa'){
    let L=EST.cache.paEst; if(q)L=L.filter(p=>(p.linha+' '+p.nome).toLowerCase().includes(q));
    let linhaAtual='';
    html=L.map(p=>{
      const cab=p.linha!==linhaAtual?`<p class="pergunta" style="margin-top:14px">${p.linha||'Sem linha'}</p>`:'';
      linhaAtual=p.linha;
      return cab+linhaEst('pa',p.id,p.nome,p.saldo_potes,'potes',false);
    }).join('');
  }else if(EST.fcat==='balde'){
    let L=EST.cache.baldeEst; if(q)L=L.filter(b=>b.produtos.nome.toLowerCase().includes(q));
    html=L.map(b=>linhaEst('balde',b.produto_id,'🪣 '+b.produtos.nome,b.quantidade_kg,'kg',false)).join('');
  }else{
    let L=EST.cache.itens;
    if(EST.fcat==='alerta')L=L.filter(i=>i.estoque_minimo!=null&&Number(i.saldo_atual)<Number(i.estoque_minimo));
    else L=L.filter(i=>i.categoria===EST.fcat);
    if(q)L=L.filter(i=>i.nome.toLowerCase().includes(q));
    html=L.map(i=>{
      const baixo=i.estoque_minimo!=null&&Number(i.saldo_atual)<Number(i.estoque_minimo);
      return linhaEst('item',i.id,i.nome,i.saldo_atual,i.unidade,baixo);
    }).join('');
  }
  document.getElementById('lista').innerHTML=html||'<div class="center">Nada encontrado.</div>';
}
async function ajuste(btn){
  if(precisaOperador())return;
  const t=btn.dataset.t, id=btn.dataset.i, atual=btn.dataset.s, un=btn.dataset.u;
  const nome=btn.closest('.item-row').querySelector('span').textContent.replace('⬤ ','').replace('🪣 ','');
  const real=prompt('Ajuste de estoque — '+nome+'\nSaldo no sistema: '+fmt(atual)+' '+un+'\n\nQual é o saldo REAL contado?',atual);
  if(real==null)return;
  const n=Number(String(real).replace(',','.'));
  if(isNaN(n)||n<0)return msg('Valor inválido',true);
  const motivo=prompt('Motivo do ajuste (obrigatório):\nex.: contagem física, perda, vencimento, erro de lançamento');
  if(motivo==null)return; if(!motivo.trim())return msg('O motivo é obrigatório',true);
  const {error}=await sb.rpc('ajustar_estoque',{p_tipo:t,p_id:id,p_saldo_real:n,p_motivo:motivo.trim(),p_responsavel:EST.operador});
  if(error)return msg(error.message,true);
  msg('✅ Ajustado: '+fmt(atual)+' → '+fmt(n)+' '+un);
  tela('estoque');
}

async function confReceber(id){
  if(precisaOperador())return;
  const c=(EST.cache.compras||[]).find(x=>x.id===id); if(!c)return msg('Pedido não encontrado',true);
  const un=(c.itens&&c.itens.unidade)||'';
  const q=Number(document.getElementById('rQtd').value.replace(',','.'));
  if(!q||q<=0)return msg('Informe a quantidade',true);
  const lote=document.getElementById('rLote').value.trim()||null;
  const ped=Number(c.quantidade_solicitada)||0, falta=Math.round((ped-q)*1000)/1000;
  if(falta>0){
    if(confirm('Chegou '+fmt(q)+' de '+fmt(ped)+' '+un+' — faltam '+fmt(falta)+' '+un+'.\n\nOK = entrega parcial: o saldo continua pendente com o fornecedor e o MRP conta ele como "a caminho".\nCancelar = fecha o pedido só com o que chegou (o resto volta a ser compra nova).')){
      const dt=prompt('Quando chega o saldo de '+fmt(falta)+' '+un+'?\n(AAAA-MM-DD — deixe vazio se o fornecedor não deu data)',c.data_prevista_entrega||new Date(Date.now()+7*864e5).toISOString().slice(0,10));
      if(dt==null)return;
      const v=dt.trim(); if(v&&!/^\d{4}-\d{2}-\d{2}$/.test(v))return msg('Data inválida — use AAAA-MM-DD',true);
      const {error}=await sb.rpc('confirmar_recebimento_parcial',{p_compra:id,p_qtd:q,p_lote:lote,p_responsavel:EST.operador,p_data_saldo:v||null});
      if(error)return msg(error.message,true);
      msg('✅ Entrou '+fmt(q)+' — saldo de '+fmt(falta)+' '+un+' segue pendente');tela('receber');return;
    }
  }
  const {error}=await sb.rpc('confirmar_recebimento',{p_compra:id,p_qtd:q,p_lote:lote,p_responsavel:EST.operador});
  if(error)return msg(error.message,true);
  msg('✅ Entrou no estoque — '+fmt(q));tela('receber');
}

/* ================= PROGRAMAÇÃO ================= */
/* --- bateladas por moinho: M1=70kg, M2=100kg --- */
const CAP_BATELADA={m1:70,m2:100};
function moinhoTipo(nome){return (nome||'').includes('2')?'m2':'m1'}
function capDe(nome){return CAP_BATELADA[moinhoTipo(nome)]}
function dividirBateladas(total,cap){const out=[];let r=Math.round(Number(total)*1000)/1000;while(r>cap+1e-9){out.push(cap);r=Math.round((r-cap)*1000)/1000}out.push(r);return out}
function mondayOf(dStr){const d=dStr?new Date(dStr+'T12:00'):new Date();const wd=(d.getDay()+6)%7;d.setDate(d.getDate()-wd);return d.toISOString().slice(0,10)}
function addDias(dStr,n){const d=new Date(dStr+'T12:00');d.setDate(d.getDate()+n);return d.toISOString().slice(0,10)}
function progSemana(delta){EST.progSemana=addDias(EST.progSemana||mondayOf(),delta);tela('programacao')}
function progHoje(){EST.progSemana=mondayOf();tela('programacao')}
function previewBat(){
  const kgEl=document.getElementById('pKg');if(!kgEl)return;
  const kg=Number((kgEl.value||'').replace(',','.'));
  const eqSel=document.getElementById('pEquip');
  const eqNome=(EST.cache.equip.find(e=>e.id===eqSel.value)||{}).nome||'';
  const cap=capDe(eqNome);const box=document.getElementById('pPreview');
  if(!kg||kg<=0){box.innerHTML='';return}
  const bs=dividirBateladas(kg,cap);
  box.innerHTML='= <b>'+bs.length+' batelada'+(bs.length>1?'s':'')+'</b> (máx '+cap+' kg/batelada no '+eqNome+'): <span class="mono">'+bs.map(x=>fmt(x,0)).join(' + ')+' kg</span>';
}

async function criarProg(){
  if(precisaOperador())return;
  const kg=Number(document.getElementById('pKg').value.replace(',','.'));
  if(!kg||kg<=0)return msg('Informe os kg',true);
  const eqNome=(EST.cache.equip.find(e=>e.id===pEquip.value)||{}).nome||'';
  const cap=capDe(eqNome);
  const bats=dividirBateladas(kg,cap);
  const linhas=bats.map(q=>({produto_id:pProd.value,equipamento_id:pEquip.value,data:pData.value,quantidade_kg:q}));
  const {error}=await sb.from('programacao_refino').insert(linhas);
  if(error)return msg(error.message,true);
  msg('✅ Programado — '+bats.length+' batelada'+(bats.length>1?'s':'')+' ('+bats.map(x=>fmt(x,0)).join('+')+' kg)');
  tela('programacao');
}

async function tMRP(){

  ]);

    .sort((a,b)=>Number(a.saldo_atual)-Number(b.saldo_atual));

  const grade=m=>{
    const dem=Number(m.necessidade)||0, sal=Number(m.saldo)||0, cam=Number(m.a_caminho)||0, comp=Number(m.a_comprar)||0;
    const disp=sal+cam;                        // disponível hoje + o que vem a caminho
    const faltaProd=Math.max(0,dem-disp);      // o que falta só pra produzir
    const reporMin=Math.max(0,comp-faltaProd); // o resto é recomposição do mínimo
    const sobra=disp-dem;
    let rank,cor,bg,tag;
    if(m.status==='faltam dados'){rank=5;cor='#2B5A78';bg='#E9F1F6';tag='FALTAM DADOS';}
    else if(faltaProd>0){rank=1;cor='#C63A3A';bg='#FDECEC';tag='FALTA PRA PRODUZIR';}
    else if(m.status==='PEDIR AGORA'){rank=2;cor='#D9772B';bg='#FBEEE2';tag='ATRASADO';}
    else if(m.status==='esta semana'){rank=3;cor='#B8862B';bg='#FBF3E0';tag='ESTA SEMANA';}
    else{rank=4;cor='#3E7C45';bg='#EAF3EA';tag='COM FOLGA';}
    const cobreHtml=faltaProd>0
      ? '<b style="color:var(--morango)">⚠ falta '+fmt(faltaProd)+' pra produzir</b>'
      : '<b style="color:var(--pistache)">✓ cobre'+(sobra>0.05?' (sobram '+fmt(sobra)+')':'')+'</b>';
    return {faltaProd,reporMin,rank,cor,bg,tag,cobreHtml};
  };
  sug.sort((a,b)=>{const ga=grade(a),gb=grade(b);return ga.rank-gb.rank||((a.pedir_ate||'9')<(b.pedir_ate||'9')?-1:1);});
  document.getElementById('app').innerHTML=`
  ${trilha('Compra')}${topo('Compras / MRP','necessidade calculada da programação dos moinhos')}
  <main>
    <div class="card"><b>➕ Pedido avulso</b><small style="color:#7A6A57;display:block;margin-bottom:8px">pra pedidos que não vêm da sugestão do MRP — ex.: programação de potes com o fornecedor, reposição combinada, etc.</small>
      <button class="btnSec" onclick="criarPedidoAvulso()">Criar pedido avulso</button>
    </div>
    <div class="card"><b>Sugestões de compra</b><small style="color:#7A6A57;display:block;margin-bottom:6px">demanda dos refinos + reposição do mínimo − saldo · ordenado por criticidade: <b style="color:#C63A3A">falta produzir</b> › <b style="color:#D9772B">atrasado</b> › <b style="color:#B8862B">esta semana</b> › <b style="color:#3E7C45">com folga</b></small>
    ${sug.length?sug.map(m=>{const g=grade(m);const u=m.unidade||'';return `
      <div style="border-top:1px solid var(--linha);border-left:4px solid ${g.cor};padding:12px 0 12px 12px;margin-top:2px">
        <div style="display:flex;justify-content:space-between;gap:8px;align-items:center">
          <b style="font-size:16.5px">${m.nome}</b><span class="chip" style="background:${g.bg};color:${g.cor};font-weight:700">${g.tag}</span></div>

async function criarPedidoAvulso(){
  if(precisaOperador())return;
  const termo=prompt('Buscar item por nome (ou parte do nome, ex.: "pote 1kg"):');
  if(termo==null||!termo.trim())return;
  const {data:itensAch,error}=await sb.from('itens').select('id,nome,unidade').ilike('nome','%'+termo.trim()+'%').order('nome').limit(20);
  if(error)return msg(error.message,true);
  if(!itensAch||!itensAch.length)return msg('Nenhum item encontrado com esse nome',true);
  const lista=itensAch.map((it,i)=>(i+1)+') '+it.nome+(it.unidade?' ('+it.unidade+')':'')).join('\n');
  const esc=prompt('Itens encontrados:\n'+lista+'\n\nDigite o número:','1');
  if(esc==null)return;
  const item=itensAch[parseInt(esc)-1];
  if(!item)return msg('Opção inválida',true);
  await novoPedido(item.id,item.nome,'');
}
async function escolherFornecedor(rotulo){
  const f=EST.cache.forns||[];
  const nomes=f.map((x,i)=>(i+1)+') '+x.nome).join('\n');
  const esc=prompt((rotulo||'Fornecedor')+':\n'+(nomes?nomes+'\n':'')+'0) Outro (digitar nome novo)\n\nDigite o número:','1');
  if(esc==null)return null;
  if(esc.trim()==='0'){
    const novoNome=prompt('Nome do novo fornecedor:');
    if(novoNome==null||!novoNome.trim())return null;
    const {data,error}=await sb.from('fornecedores').insert({nome:novoNome.trim()}).select().single();
    if(error){msg(error.message,true);return null;}
    EST.cache.forns=EST.cache.forns||[];EST.cache.forns.push(data);
    return data;
  }
  const fi=f[parseInt(esc)-1];
  if(!fi){msg('Fornecedor inválido',true);return null;}
  return fi;
}
async function novoPedido(itemId,nome,qtd){

async function editarPedido(id){

  const c=(EST.cache.pedidos||[]).find(x=>x.id===id); if(!c)return msg('Pedido não encontrado',true);
  const nome=(c.itens&&c.itens.nome)||'item'; const un=(c.itens&&c.itens.unidade)||'';

    const {error}=await sb.from('compras').update({quantidade_solicitada:n}).eq('id',id); if(error)return msg(error.message,true);
    await sb.from('atividades').insert({tipo:'compra',descricao:'Pedido editado — '+nome+': quantidade para '+fmt(n)+' '+un,responsavel:EST.operador});
    msg('✅ Quantidade alterada');
  }else if(o==='2'){
    const fi=await escolherFornecedor('Novo fornecedor para '+nome); if(!fi)return;
    const {error}=await sb.from('compras').update({fornecedor_id:fi.id,fornecedor_nome:fi.nome}).eq('id',id); if(error)return msg(error.message,true);
    await sb.from('atividades').insert({tipo:'compra',descricao:'Pedido editado — '+nome+': fornecedor para '+fi.nome,responsavel:EST.operador});
    msg('✅ Fornecedor alterado');
  }else if(o==='3'){
    const nova=prompt('Nova entrega prevista de '+nome+' (AAAA-MM-DD):',c.data_prevista_entrega||''); if(nova==null)return;
    const v=nova.trim(); if(!/^\d{4}-\d{2}-\d{2}$/.test(v))return msg('Data inválida — use AAAA-MM-DD',true);
    const {error}=await sb.from('compras').update({data_prevista_entrega:v}).eq('id',id); if(error)return msg(error.message,true);

    msg('✅ Entrega remarcada');
  }else if(o==='4'){
    const mapa={'1':'pendente','2':'aguardando_pagamento','3':'liberado'};
    const s=prompt('Novo status de '+nome+':\n1) pendente\n2) aguardando pagamento\n3) liberado\n\n(dar entrada é feito na tela Receber)\n\nDigite o número:','3'); if(s==null)return;
    const ns=mapa[s.trim()]; if(!ns)return msg('Status inválido',true);
    const {error}=await sb.from('compras').update({status:ns}).eq('id',id); if(error)return msg(error.message,true);
    await sb.from('atividades').insert({tipo:'compra',descricao:'Pedido editado — '+nome+': status para '+ns.replace('_',' '),responsavel:EST.operador});
    msg('✅ Status alterado');
  }else if(o==='5'){
    if(!confirm('Cancelar o pedido de '+nome+' ('+fmt(c.quantidade_solicitada)+' '+un+')?\nEle sai da lista de pedidos em aberto.'))return;
    const {error}=await sb.from('compras').update({status:'cancelado'}).eq('id',id); if(error)return msg(error.message,true);
    await sb.from('atividades').insert({tipo:'compra',descricao:'Pedido cancelado — '+nome+' ('+fmt(c.quantidade_solicitada)+' '+un+')',responsavel:EST.operador});

  tela('mrp');

function carregarXLSX(){
  if(typeof XLSX!=='undefined')return Promise.resolve(true);
  if(window._xlsxP)return window._xlsxP;
  const urls=['https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js','https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js','https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js'];
  window._xlsxP=new Promise(res=>{
    let i=0;
    const tenta=()=>{
      if(typeof XLSX!=='undefined')return res(true);
      if(i>=urls.length)return res(false);
      const s=document.createElement('script');
      s.src=urls[i++];
      s.onload=()=>res(typeof XLSX!=='undefined');
      s.onerror=tenta;
      document.head.appendChild(s);
    };
    tenta();
  });
  return window._xlsxP;
}
async function importarUpSeller(files){
  if(precisaOperador())return;
  const arq=Array.isArray(files)?files:[files];
  if(!arq.length)return;
  if(typeof XLSX==='undefined'){
    msg('⏳ Carregando leitor de planilha…');
    const ok=await carregarXLSX();
    if(!ok)return msg('Não consegui carregar o leitor de planilha — verifique a internet e tente de novo',true);
  }
  msg('⏳ Lendo '+arq.length+(arq.length>1?' planilhas…':' planilha…'));
  let linhas=[];
  try{
    for(const file of arq){
      const buf=await file.arrayBuffer();
      const wb=XLSX.read(buf,{type:'array'});
      wb.SheetNames.forEach(sn=>{linhas=linhas.concat(XLSX.utils.sheet_to_json(wb.Sheets[sn],{defval:''}));});
    }
  }catch(e){return msg('Erro ao ler o arquivo: '+e.message,true);}
  const {data:dep}=await sb.from('depara_sku').select('codigo,produto_acabado_id');
  const mapa={};(dep||[]).forEach(d=>{if(d.produto_acabado_id)mapa[String(d.codigo).trim()]=d.produto_acabado_id;});
  const agg={},nao={};let ign=0;
  for(const r of linhas){
    const enviado=String(r['Enviado']||'').trim();
    const canc=String(r['Pós-venda/Cancelado/Devolvido']||'').toLowerCase();
    if(enviado){ign++;continue;}
    if(canc.includes('cancel')||canc.includes('devolv')){ign++;continue;}
    const cod=String(r['SKU']||'').trim();if(!cod){ign++;continue;}
    const q=Number(r['Qtd. do Produto'])||0;if(!q)continue;
    const plat=String(r['Plataformas']||'').trim();
    const prazo=String(r['Prazo de Envio']||'').slice(0,10)||null;
    const pid=mapa[cod];
    if(!pid){nao[cod]=nao[cod]||{codigo:cod,plataforma:plat,nome:String(r['Nome do Anúncio']||''),qtd:0};nao[cod].qtd+=q;continue;}
    const k=pid+'|'+(prazo||'')+'|'+plat;
    agg[k]=agg[k]||{produto_acabado_id:pid,data_despacho:prazo,plataforma:plat,qtd_potes:0};
    agg[k].qtd_potes+=q;
  }
  await sb.from('demanda_vendas').delete().eq('origem','import_upseller').eq('status','aberto');
  const rows=Object.values(agg).map(a=>({produto_acabado_id:a.produto_acabado_id,data_despacho:a.data_despacho,plataforma:a.plataforma,qtd_potes:a.qtd_potes,status:'aberto',origem:'import_upseller',criado_por:EST.operador}));

async function importarSimplificada(files){
  if(precisaOperador())return;
  const arq=Array.isArray(files)?files:[files];
  if(!arq.length)return;
  if(typeof XLSX==='undefined'){
    msg('⏳ Carregando leitor de planilha…');
    const ok=await carregarXLSX();
    if(!ok)return msg('Não consegui carregar o leitor de planilha — verifique a internet e tente de novo',true);
  }
  msg('⏳ Lendo planilha…');
  let linhas=[];
  try{
    for(const file of arq){
      const buf=await file.arrayBuffer();
      const wb=XLSX.read(buf,{type:'array'});
      wb.SheetNames.forEach(sn=>{linhas=linhas.concat(XLSX.utils.sheet_to_json(wb.Sheets[sn],{defval:''}));});
    }
  }catch(e){return msg('Erro ao ler o arquivo: '+e.message,true);}
  if(!linhas.length)return msg('Planilha vazia ou em formato inesperado',true);
  const chaveCanal={};Object.keys(linhas[0]).forEach(k=>{
    const nk=k.trim().toLowerCase();
    if(nk.includes('tik')||nk.includes('tiktok'))chaveCanal[k]='TikTok Shop';
    else if(nk.includes('mercado'))chaveCanal[k]='Mercado Livre';
    else if(nk.includes('shopee'))chaveCanal[k]='Shopee';
    else if(nk==='site')chaveCanal[k]='Site';
  });
  const colProd=Object.keys(linhas[0]).find(k=>k.trim().toLowerCase()==='produto')||Object.keys(linhas[0])[0];
  const {data:dep}=await sb.from('depara_sku').select('codigo,produto_acabado_id');
  const mapa={};(dep||[]).forEach(d=>{if(d.produto_acabado_id)mapa[String(d.codigo).trim()]=d.produto_acabado_id;});
  const hoje=hojeLocal();
  const agg={},nao={};
  for(const r of linhas){
    const nome=String(r[colProd]||'').trim();if(!nome)continue;
    const pid=mapa[nome];
    for(const col in chaveCanal){
      const q=Number(r[col])||0;if(!q)continue;
      const plat=chaveCanal[col];
      if(!pid){nao[nome]=nao[nome]||{codigo:nome,plataforma:plat,nome:nome,qtd:0};nao[nome].qtd+=q;continue;}
      const k=pid+'|'+plat;
      agg[k]=agg[k]||{produto_acabado_id:pid,plataforma:plat,qtd_potes:0};
      agg[k].qtd_potes+=q;
    }
  }
  await sb.from('demanda_vendas').delete().eq('origem','import_simplificado').eq('status','aberto');
  const rows=Object.values(agg).map(a=>({produto_acabado_id:a.produto_acabado_id,data_despacho:hoje,plataforma:a.plataforma,qtd_potes:a.qtd_potes,status:'aberto',origem:'import_simplificado',criado_por:EST.operador}));
  if(rows.length){const {error}=await sb.from('demanda_vendas').insert(rows);if(error)return msg(error.message,true);}
  await sb.from('atividades').insert({tipo:'compra',descricao:'Demanda de vendas (planilha simplificada) — '+rows.length+' linhas, '+Object.keys(nao).length+' a mapear',responsavel:EST.operador});
  EST.cache.naoMapeados=Object.values(nao);
  msg('✅ '+rows.length+' linhas importadas'+(Object.keys(nao).length?' · '+Object.keys(nao).length+' a mapear':''));
  tela('vendas');
}

function eMistura(){const p=EST.cache.pa.find(x=>x.id===ePa.value);return p&&p.produto_id?EST.cache.mistura[p.produto_id]:null}
function ePeso(){
  const p=EST.cache.pa.find(x=>x.id===ePa.value);
  document.getElementById('eBaldeBox').style.display=eMistura()?'none':'block';
  document.getElementById('ePesoBox').innerHTML=p&&p.peso_pote_kg==null
    ?`<label style="color:var(--morango)">⚠️ Peso do pote não cadastrado — informe (kg por pote)</label><input id="ePeso" inputmode="decimal" placeholder="ex.: 1.01" oninput="eResumo()">`
    :(p?`<p style="font-size:13.5px;color:#7A6A57;margin-top:6px">peso do pote: <b class="mono">${p.peso_pote_kg} kg</b> · em estoque hoje: ${fmt(p.saldo_potes,0)} potes</p>`:'');
}
function eResumo(){
  const p=EST.cache.pa.find(x=>x.id===ePa.value);
  const peso=p?.peso_pote_kg??Number((document.getElementById('ePeso')?.value||'').replace(',','.'));
  const n=Number(ePotes.value)||0;
  const kg=peso?n*peso:0;
  const mix=eMistura();
  let html='Preencha acima…';
  if(n&&peso){
    if(mix){
      html=`<b>Mistura por receita</b> — ${n} potes de <b>${p.nome}</b> = ${fmt(kg)} kg:<br>`+
        mix.map(c=>{
          const need=kg*c.pct/100, tem=EST.cache.saldoBalde[c.pid]||0;
          return `<span style="color:var(--pistache);font-weight:900">→</span> ${c.pct}% ${c.nome}: <b class="mono">${fmt(need)} kg</b>${need>tem?` <b style="color:var(--morango)">⚠️ balde tem só ${fmt(tem)}</b>`:''}`;
        }).join('<br>')+
        `<br><span class="mono" style="font-size:13px">${eLote.value} · por ${EST.operador||'—'}</span>`;
    }else{
      const b=EST.cache.balde.find(x=>x.produto_id===eBalde.value);
      html=b?`Sai <b>${fmt(kg)} kg</b> do balde <b>${b.produtos.nome}</b><br><span style="color:var(--pistache);font-weight:900">→</span> entram <b>${n} potes</b> de <b>${p.nome}</b><br><span class="mono" style="font-size:13px">${eLote.value} · por ${EST.operador||'—'}</span>${kg>Number(b.quantidade_kg)?'<br><b style="color:var(--morango)">⚠️ maior que o saldo do balde!</b>':''}`:'Nenhum balde com saldo.';
    }
  }
  document.getElementById('eRes').innerHTML=html;
}
async function confEnvase(){
  if(precisaOperador())return;
  const p=EST.cache.pa.find(x=>x.id===ePa.value);
  const n=parseInt(ePotes.value);if(!n||n<=0)return msg('Informe os potes',true);
  if(p.peso_pote_kg==null){
    const peso=Number((document.getElementById('ePeso')?.value||'').replace(',','.'));
    if(!peso||peso<=0)return msg('Informe o peso do pote',true);
    const {error:e1}=await sb.from('produto_acabado').update({peso_pote_kg:peso}).eq('id',p.id);
    if(e1)return msg(e1.message,true);
    p.peso_pote_kg=peso;
  }
  const mix=eMistura();
  const {error}=await sb.rpc('envasar',{p_produto:mix?null:eBalde.value,p_pa:p.id,p_potes:n,p_responsavel:EST.operador,p_lote:eLote.value.trim()||null});
  if(error)return msg(error.message,true);
  msg('✅ Envase gravado — '+n+' potes');tela('envase');
}

/* ================= METAS DO DIA ================= */
function hojeLocal(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function inicioSemana(dataISO){
  const d=new Date(dataISO+'T12:00');const dow=d.getDay();const diff=(dow===0?-6:1-dow);
  d.setDate(d.getDate()+diff);return d;
}
function diasDaSemana(dataISO){
  const ini=inicioSemana(dataISO);const arr=[];
  for(let i=0;i<7;i++){const d=new Date(ini);d.setDate(ini.getDate()+i);arr.push(d.toISOString().slice(0,10))}
  return arr;
}
function mudaSemana(deltaDias){
  const d=new Date((EST.metaDia||hojeLocal())+'T12:00');d.setDate(d.getDate()+deltaDias);
  EST.metaDia=d.toISOString().slice(0,10);tela('metas');
}

  <main>

381 Creme Ganache Chocolate Branco e Avelã La Ben 1kg">${(desp.data?.conteudo||'').replace(/</g,'&lt;')}</textarea>

        </div>

          <button onclick="delMeta('${m.id}')" style="border:1.5px solid var(--linha);background:#fff;border-radius:10px;min-width:40px;min-height:38px;cursor:pointer">🗑</button></span></div>`).join('')}
        ${ts.map(t=>`<div class="item-row"><span style="display:flex;align-items:center;gap:8px"><input type="checkbox" ${t.concluido?'checked':''} onchange="toggleTarefa('${t.id}',this.checked)" style="width:22px;height:22px;flex-shrink:0"><span style="${t.concluido?'text-decoration:line-through;color:#A99A82':''}">${t.descricao}${t.responsavel_designado?` <b>(${t.responsavel_designado})</b>`:''}</span></span>
          <span style="display:flex;gap:10px;align-items:center">${t.concluido?`<small style="color:#5FBF6A">✅ ${t.concluido_por||''}</small>`:''}<button onclick="delTarefa('${t.id}')" style="border:1.5px solid var(--linha);background:#fff;border-radius:10px;min-width:40px;min-height:38px;cursor:pointer">🗑</button></span></div>`).join('')}

}
function imprimirDia(d){
  const c=EST.metaImpressao&&EST.metaImpressao[d];if(!c)return;
  const {dt,ms,ts,ps,statusChip}=c;
  const html=`<!doctype html><html><head><meta charset="utf-8"><title>Nutríssima — ${dt}</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;color:#221507;padding:24px;max-width:720px;margin:0 auto}
    h1{font-size:22px;margin:0 0 2px}h1 small{display:block;font-size:14px;font-weight:400;color:#555}
    h2{font-size:15px;text-transform:uppercase;letter-spacing:.04em;color:#33200F;border-bottom:2px solid #33200F;padding-bottom:4px;margin:22px 0 8px}
    .linha{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #ddd;font-size:15px}
    .tag{display:inline-block;font-size:11px;font-weight:700;text-transform:uppercase;background:#eee;border-radius:6px;padding:2px 8px;margin-right:8px}
    .box{width:20px;height:20px;border:2px solid #221507;display:inline-block;margin-right:10px;vertical-align:middle;flex-shrink:0}
    .vazio{color:#888;font-size:14px}
    @media print{body{padding:0}}
  </style></head><body>
    <h1>🏭 Nutríssima<small>${dt}</small></h1>
    ${ps.length?`<h2>⚖️ Programação de pesagem</h2>${ps.map(p=>{const sc=statusChip[p.status]||['','?'];return `<div class="linha"><span><span class="tag">${p.equipamentos?.nome||''}</span>${p.produtos?.nome||'—'}</span><b>${fmt(p.quantidade_kg,0)} kg <span style="font-weight:400;color:#666">(${sc[1]})</span></b></div>`}).join('')}`:''}
    ${ms.length?`<h2>🎯 Metas</h2>${ms.map(m=>`<div class="linha"><span><span class="tag">${m.area}</span>${m.ref_nome}</span><b>${fmt(m.meta,0)} ${m.unidade}</b></div>`).join('')}`:''}
    ${ts.length?`<h2>✅ Tarefas</h2>${ts.map(t=>`<div class="linha"><span><span class="box"></span>${t.descricao}${t.responsavel_designado?` <b>(${t.responsavel_designado})</b>`:''}</span></div>`).join('')}`:''}
    ${!ps.length&&!ms.length&&!ts.length?'<p class="vazio">Nada neste dia.</p>':''}
  </body></html>`;
  const w=window.open('','_blank');w.document.write(html);w.document.close();
  w.onload=()=>{w.print()};setTimeout(()=>{try{w.print()}catch(e){}},300);
}
async function salvarTarefa(){
  const descricao=document.getElementById('tDesc').value.trim();
  const responsavel=document.getElementById('tResp').value.trim()||null;
  if(!descricao)return msg('Descreva a tarefa',true);
  const {error}=await sb.from('tarefas').insert({data:EST.metaDia,descricao,responsavel_designado:responsavel});
  if(error)return msg(error.message,true);
  msg('✅ Tarefa adicionada');tela('metas');
}
async function toggleTarefa(id,checked){
  if(checked){
    const quem=prompt('Quem concluiu essa tarefa?');
    if(quem==null)return tela('metas');
    const {error}=await sb.from('tarefas').update({concluido:true,concluido_por:quem.trim()||'—',concluido_em:new Date().toISOString()}).eq('id',id);
    if(error)return msg(error.message,true);
  }else{
    const {error}=await sb.from('tarefas').update({concluido:false,concluido_por:null,concluido_em:null}).eq('id',id);
    if(error)return msg(error.message,true);
  }
  tela('metas');
}
async function salvarDespachos(){
  const conteudo=document.getElementById('dConteudo').value.trim();
  const {error}=await sb.from('despachos_ecommerce').upsert({id:1,conteudo,atualizado_em:new Date().toISOString(),atualizado_por:EST.operador||'gestor'});
  if(error)return msg(error.message,true);
  msg('✅ Lista de despachos salva');tela('metas');
}
async function delTarefa(id){
  const {error}=await sb.from('tarefas').delete().eq('id',id);
  if(error)return msg(error.message,true);tela('metas');
}
function trocaArea(a){
  const el=document.getElementById('mRef');
  el.innerHTML=(a==='envase'
    ?EST.cache.mPa.map(p=>'<option value="'+p.id+'">'+(p.linha?p.linha+' · ':'')+p.nome+'</option>')
    :EST.cache.mProds.map(p=>'<option value="'+p.id+'">'+p.nome+'</option>')).join('');
}
async function salvarRecado(){
  const {error}=await sb.from('quadro_recado').upsert({data:EST.metaDia,recado:document.getElementById('mRecado').value.trim()});
  if(error)return msg(error.message,true);msg('✅ Recado salvo');
}
async function salvarMeta(){
  const area=document.getElementById('mArea').value, ref=document.getElementById('mRef').value;
  const meta=Number(document.getElementById('mMeta').value.replace(',','.'));
  if(!meta||meta<=0)return msg('Informe a meta',true);
  const lista=area==='envase'?EST.cache.mPa:EST.cache.mProds;
  const item=lista.find(x=>x.id===ref);
  const nome=area==='envase'&&item.linha?item.linha+' · '+item.nome:item.nome;
  const {error}=await sb.from('metas_dia').upsert({data:EST.metaDia,area,ref_id:ref,ref_nome:nome,meta,unidade:area==='envase'?'potes':'kg'},{onConflict:'data,area,ref_id'});
  if(error)return msg(error.message,true);
  msg('✅ Meta adicionada');tela('metas');
}
async function delMeta(id){
  const {error}=await sb.from('metas_dia').delete().eq('id',id);
  if(error)return msg(error.message,true);tela('metas');
}

/* ================= MODO TV ================= */
async function tTV(){
  if(EST.tvTimer){clearInterval(EST.tvTimer);EST.tvTimer=null}
  if(EST.tvRelogio){clearInterval(EST.tvRelogio);EST.tvRelogio=null}
  await tvRender();
  EST.tvTimer=setInterval(()=>{if(document.querySelector('.tv'))tvRender();else{clearInterval(EST.tvTimer);EST.tvTimer=null}},60000);
  EST.tvRelogio=setInterval(()=>{const r=document.getElementById('tvClock');if(r)r.textContent=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});else{clearInterval(EST.tvRelogio);EST.tvRelogio=null}},1000);
}

            <div style="font-size:18px;font-weight:900;color:${ehHoje?'#FFD84D':'#E8DECF'};text-transform:capitalize;margin-bottom:8px">${dataFmt}${ehHoje?' · HOJE':''}</div>
            ${Object.values(progPorDia[d]).map(g=>{
              const statusTxt=Object.entries(g.statusCount).map(([s,n])=>n+' '+(lblStatus[s]||s)).join(' · ');
              return `<div class="tv-item" style="margin:0 0 8px;padding:10px 12px"><div><div class="nome" style="font-size:16px">${(g.equip==='Moinho 1'?'M1':(g.equip==='Moinho 2'?'M2':g.equip))} · ${g.produto}</div>
              <div class="nums" style="font-size:14px">${g.bateladas} batelada${g.bateladas>1?'s':''} · ${fmt(g.kg,0)} kg · ${statusTxt}</div></div></div>`;
            }).join('')}
          </div>`;
        }).join('')}
      </div>
    </div>`:null;
  document.getElementById('app').innerHTML=`
  <div class="tv">
    <div style="display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap">
      <h1>🏭 Nutríssima — Quadro do Dia <small style="font-size:16px;color:#C9B99F;font-weight:700">${new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'})}</small></h1>
      <div style="display:flex;gap:14px;align-items:center"><span class="relogio" id="tvClock">${new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}</span>
      <button onclick="tela('inicio')" style="border:1px solid #ffffff33;background:transparent;color:#C9B99F;border-radius:10px;padding:8px 14px;cursor:pointer">sair</button></div>
    </div>
    <div class="tv-dash">
      ${painelCompras?`<div class="wide">${painelCompras}</div>`:''}
      ${painelDesp?`<div>${painelDesp}</div>`:''}
      ${painelEstoque?`<div>${painelEstoque}</div>`:''}
      ${painelEmbalagens?`<div>${painelEmbalagens}</div>`:''}
      ${painelTarefas?`<div>${painelTarefas}</div>`:''}
      ${painelPotes?`<div class="wide">${painelPotes}</div>`:''}
      ${painelProgramacao?`<div class="wide">${painelProgramacao}</div>`:''}
    </div>
    <p style="margin-top:14px;color:#8A7A64;font-size:13px">atualiza sozinho a cada 60 s · para a TV, abra ${location.origin+location.pathname}#tv</p>
  </div>`;
}

boot();
</script>
</body>
</html>
